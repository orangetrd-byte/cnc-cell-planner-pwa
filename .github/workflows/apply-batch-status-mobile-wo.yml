name: Apply batch status mobile WO

on:
  push:
    paths:
      - '.github/workflows/apply-batch-status-mobile-wo.yml'
      - '.github/scripts/apply_batch_status_mobile_wo.py'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/scripts/apply_batch_status_mobile_wo.py
      - name: Commit updated app shell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/apply-batch-status-mobile-wo.yml .github/scripts/apply_batch_status_mobile_wo.py
          git commit -m "Add batch status and mobile WO visibility"
          git push
