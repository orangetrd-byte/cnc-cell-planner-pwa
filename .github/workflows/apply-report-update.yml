name: Apply report update

on:
  push:
    paths:
      - ".github/workflows/apply-report-update.yml"
      - ".github/scripts/apply_report_update.py"

permissions:
  contents: write

jobs:
  patch-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch report files
        run: python3 .github/scripts/apply_report_update.py
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/apply-report-update.yml .github/scripts/apply_report_update.py
          git commit -m "Add completed operation report summary" || exit 0
          git push
