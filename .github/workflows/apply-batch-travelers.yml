name: Apply batch travelers

on:
  push:
    paths:
      - ".github/workflows/apply-batch-travelers.yml"
      - ".github/scripts/apply_batch_travelers.py"

permissions:
  contents: write

jobs:
  patch-batch-travelers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch batch traveler files
        run: python3 .github/scripts/apply_batch_travelers.py
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/apply-batch-travelers.yml .github/scripts/apply_batch_travelers.py
          git commit -m "Add batch traveler creation" || exit 0
          git push
