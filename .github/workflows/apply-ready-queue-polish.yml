name: Apply ready queue polish

on:
  push:
    paths:
      - '.github/workflows/apply-ready-queue-polish.yml'
      - '.github/scripts/apply_ready_queue_polish.py'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/scripts/apply_ready_queue_polish.py
      - name: Commit updated app shell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/apply-ready-queue-polish.yml .github/scripts/apply_ready_queue_polish.py
          git commit -m "Add ready queue polish"
          git push
