name: Apply responsive tables

on:
  push:
    paths:
      - '.github/workflows/apply-responsive-tables.yml'
      - '.github/scripts/apply_responsive_tables.py'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .github/scripts/apply_responsive_tables.py
      - name: Commit updated app shell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/apply-responsive-tables.yml .github/scripts/apply_responsive_tables.py
          git commit -m "Add responsive traveler and operation tables"
          git push
